<main class="container">
  <section class="section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div>
        <h1>EMI Calculator</h1>
        <p class="small-text">Estimate your monthly payment before applying.</p>
      </div>
      <a class="btn btn-primary cta-eligibility" href="apply.html">Apply Now</a>
    </div>
    <form id="calculatorForm" class="form-card">
      <div class="field"><label for="loanAmount">Loan Amount (₹)</label><input id="loanAmount" type="number" min="100000" placeholder="e.g. 50,00,000" required /></div>
      <div class="field"><label for="interestRate">Interest Rate (% per annum)</label><input id="interestRate" type="number" min="1" step="0.01" placeholder="e.g. 7.35" required /></div>
      <div class="field"><label for="loanTenure">Tenure (years)</label><input id="loanTenure" type="number" min="1" max="30" placeholder="e.g. 20" required /></div>
      <div class="form-actions"><button id="calculateBtn" class="btn btn-primary" type="submit">Calculate EMI</button></div>
      <div id="emiResult" class="results" aria-live="polite"></div>
    </form>
  </section>
</main>
