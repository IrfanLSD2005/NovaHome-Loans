<main class="container">
  <section class="section">
    <h1>Apply for Loan</h1>
    <p class="small-text">Complete the form to quickly submit your loan request.</p>
    <div class="form-card">
      <form id="loanForm">
        <div class="field"><label for="fullName">Full Name</label><input id="fullName" name="fullName" type="text" required /></div>
        <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required /></div>
        <div class="field"><label for="phone">Phone</label><input id="phone" name="phone" type="tel" required /></div>
        <div class="field"><label for="employmentType">Employment Type</label><select id="employmentType" name="employmentType" required><option value="">Select</option><option value="Salaried">Salaried</option><option value="Self-Employed">Self-Employed</option><option value="Business">Business</option><option value="Student">Student</option></select></div>
        <div class="field"><label for="monthlyIncome">Monthly Income</label><select id="monthlyIncome" name="monthlyIncome" required><option value="">Select</option><option value="<50k">Less than ₹50,000</option><option value="50k-1L">₹50,000 - ₹1,00,000</option><option value=">1L">Above ₹1,00,000</option></select></div>
        <div class="field"><label for="loanType">Loan Type</label><select id="loanType" name="loanType" required><option value="">Select</option><option value="Home Loan">Home Loan</option><option value="Balance Transfer">Balance Transfer</option><option value="Loan Against Property">Loan Against Property</option></select></div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Submit Application</button></div>
      </form>
    </div>
  </section>
</main>
